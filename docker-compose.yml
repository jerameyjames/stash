version: '3.8'

services:
  # Database
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: stash
      POSTGRES_USER: stash
      POSTGRES_PASSWORD: stash_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stash MCP server + background consolidation
  stash:
    build: .
    command: ["mcp", "serve", "--host", "0.0.0.0", "--port", "8080", "--with-consolidation"]
    ports:
      - "8080:8080"
    environment:
      # Required
      STASH_POSTGRES_DSN: postgresql://stash:stash_dev_password@postgres:5432/stash?sslmode=disable
      STASH_VECTOR_DIM: 1536
      STASH_MAX_RESULT_SIZE: 10000
      STASH_OPENAI_API_KEY: ${STASH_OPENAI_API_KEY}
      STASH_OPENAI_BASE_URL: ${STASH_OPENAI_BASE_URL}
      STASH_EMBEDDING_MODEL: ${STASH_EMBEDDING_MODEL}
      STASH_REASONER_MODEL: ${STASH_REASONER_MODEL}
      STASH_REASONER_API_KEY: ${STASH_REASONER_API_KEY:-}
      STASH_REASONER_BASE_URL: ${STASH_REASONER_BASE_URL:-}
      STASH_REASONER_MAX_TOKENS: ${STASH_REASONER_MAX_TOKENS:-4096}
      STASH_REASONER_MAX_RETRIES: ${STASH_REASONER_MAX_RETRIES:-2}
      STASH_REASONER_RATE_LIMIT_COOLDOWN: ${STASH_REASONER_RATE_LIMIT_COOLDOWN:-5m}
      STASH_REASONER_PAYMENT_COOLDOWN: ${STASH_REASONER_PAYMENT_COOLDOWN:-1h}
      STASH_REASONER_SERVER_ERROR_COOLDOWN: ${STASH_REASONER_SERVER_ERROR_COOLDOWN:-1m}
      STASH_CONTEXT_TTL: 1h
      STASH_HTTP_ADDR: :9090
      STASH_LOG_LEVEL: info
      STASH_LOG_FORMAT: text
      # Optional consolidation configs
      STASH_CONSOLIDATION_BATCH_SIZE: 100
      STASH_CONSOLIDATION_SIMILARITY_THRESHOLD: 0.85
      STASH_CONSOLIDATION_DEDUP_THRESHOLD: 0.95
      STASH_CONSOLIDATION_WINDOW: 168h
      STASH_DECAY_FACTOR: 0.95
      STASH_EXPIRY_THRESHOLD: 0.1
      STASH_RETRIEVAL_LEARNING_ENABLED: ${STASH_RETRIEVAL_LEARNING_ENABLED:-false}
      STASH_RETRIEVAL_OVERFETCH_FACTOR: ${STASH_RETRIEVAL_OVERFETCH_FACTOR:-3}
      STASH_RETRIEVAL_UTILITY_WEIGHT: ${STASH_RETRIEVAL_UTILITY_WEIGHT:-0.08}
      STASH_RETRIEVAL_MAX_UTILITY_DELTA: ${STASH_RETRIEVAL_MAX_UTILITY_DELTA:-0.10}
      STASH_RECALL_HISTORY_RETENTION: ${STASH_RECALL_HISTORY_RETENTION:-2160h}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/stash", "env"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
